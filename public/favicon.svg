<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0d0d1c"/>

  <!-- Gradient border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>

  <!-- DN text -->
  <text
    x="32" y="43"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="-1"
    fill="url(#txt)"
  >DN</text>
</svg>
